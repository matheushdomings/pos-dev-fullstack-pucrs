# This is a basic workflow to help you get started with Actions

name: CI

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the main branch
  push:
    branches: [ "main" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build" 
  CI:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4

      - name: Setup do NodeJS
        uses: actions/setup-node@v3.0.0
        with: 
          node-version: 16.13.2

      - name: Instalação do Mocha e dos pacotes para teste
        run: |
         cd mod04-devops-basico/conversao-temperatura/src;
         npm install -g mocha;
         npm install 

      - name: Execução do teste
        run: mocha mod04-devops-basico/conversao-temperatura/src/test/convert.js

        
        - name: Construção da imagem Docker
        # You may pin to the exact commit or the version.
        # uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        uses: docker/build-push-action@v6.19.2
        with:
          context: src
          file: src/Dockerfile
          push: true
          tags: |
            fabricioveronez/aula-conversao-temperatura:v1
            fabricioveronez/aula-conversao-temperatura:latest
        
          

      
